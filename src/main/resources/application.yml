server:
  port: 8080

log-analyzer:
  ssh-key-path: ~/.ssh/id_rsa
  cache-ttl-seconds: 300
  max-cache-file-size-mb: 50
  sources:
    - name: ignite-node-1
      log-path: /opt/ignite/work/log
      connection: LOCAL
      log-format: IGNITE
          - name: order-service
      log-path: /var/log/order-service/logs
      connection: LOCAL
      log-format: MICROSERVICE
    # Пример удалённого микросервиса по SSH:
    # - name: payment-service
    #   log-path: /opt/payment/logs
    #   connection: SSH
    #   ssh-host: 10.0.0.6
    #   ssh-port: 22
    #   ssh-user: deploy
    #   log-format: MICROSERVICE
    #   
spring:
  application:
    name: log-analyzer

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
