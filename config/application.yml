server:
  port: 18765
  tomcat:
    threads:
      max: 16

log-analyzer:
  ssh-key-path: ~/.ssh/id_rsa      # путь к SSH-ключу для удалённых источников
  cache-ttl-seconds: 300            # TTL кэша файлов в секундах
  max-cache-file-size-mb: 50        # файлы крупнее этого не кэшируются
  max-cached-files: 20              # максимум файлов одновременно в кэше (старые вытесняются)
  log-timezone: Europe/Moscow       # таймзона в которой записаны метки времени в лог-файлах
  cors-allowed-origin: http://localhost:5173  # разрешённый origin для CORS (UI dev-сервер)
  max-concurrent-analyses: 2                 # максимум одновременных анализов
  max-analysis-results: 10000                # лимит записей на один анализ (защита от OOM)
  min-free-heap-mb: 200                      # минимум свободной памяти для запуска анализа (MB)

  sources:

    # --- Локальный кластер Apache Ignite ---
    - name: ignite-node-1
      log-path: /opt/ignite/work/log
      connection: LOCAL
      log-format: IGNITE             # IGNITE | MICROSERVICE | AUTO
      watch-levels: [ERROR, WARN]    # уровни по умолчанию (без явного ?levels=)

    # --- Локальный микросервис ---
    - name: order-service
      log-path: /var/log/order-service/logs
      connection: LOCAL
      log-format: MICROSERVICE
      watch-levels: [ERROR]

    # --- Удалённый микросервис по SSH ---
    - name: payment-service
      log-path: /opt/payment/logs
      connection: SSH
      ssh-host: 10.0.0.5
      ssh-port: 22
      ssh-user: ubuntu
      log-format: MICROSERVICE
      watch-levels: [ERROR, WARN]

    # --- Удалённый Ignite по SSH ---
    - name: ignite-node-2
      log-path: /opt/ignite/work/log
      connection: SSH
      ssh-host: 10.0.0.6
      ssh-port: 22
      ssh-user: ubuntu
      log-format: IGNITE
      watch-levels: [ERROR, WARN]
